<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Sky Dasher</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a1a;
      --accent: #f7c948;
      --accent2: #ff6b6b;
      --accent3: #6bffb8;
      --text: #e8e8f0;
      --overlay-bg: rgba(5, 5, 20, 0.92);
      --box-bg: #12122a;
      --box-border: #f7c948
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    html,
    body {
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      width: 100%;
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #game-wrapper {
      position: relative;
      width: 800px;
      height: 480px;
      border: 3px solid var(--accent);
      box-shadow: 0 0 40px rgba(247, 201, 72, 0.3), 0 0 80px rgba(247, 201, 72, 0.1);
      flex-shrink: 0;
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #0a0a1a;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: var(--overlay-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .overlay.hidden {
      display: none
    }

    .overlay-box {
      background: var(--box-bg);
      border: 3px solid var(--box-border);
      padding: 24px 36px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
      box-shadow: 0 0 30px rgba(247, 201, 72, 0.2);
      max-width: 92%;
    }

    .game-title {
      font-size: 2.2rem;
      color: var(--accent);
      text-shadow: 4px 4px 0 #a07800;
      letter-spacing: 4px;
      line-height: 1.2;
    }

    .subtitle {
      font-size: 0.5rem;
      color: var(--accent3);
      letter-spacing: 3px;
      margin-top: -6px;
    }

    .gameover-title {
      font-size: 1.5rem;
      color: var(--accent2);
      text-shadow: 3px 3px 0 #900;
    }

    .final-score {
      font-size: 0.65rem;
      color: var(--accent);
      line-height: 2
    }

    .best-score {
      font-size: 0.5rem;
      color: var(--accent3)
    }

    .ctrl {
      font-size: 0.4rem;
      color: var(--text);
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
    }

    .key {
      background: #2a2a4a;
      color: var(--accent);
      padding: 3px 7px;
      border: 1px solid var(--accent);
      min-width: 70px;
      display: inline-block;
      text-align: center;
    }

    .controls-info {
      display: flex;
      flex-direction: column;
      gap: 7px;
      border: 2px solid #2a2a4a;
      padding: 10px 14px;
      background: #0a0a1a;
      width: 100%;
    }

    .btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.6rem;
      background: var(--accent);
      color: #0a0a1a;
      border: none;
      padding: 11px 22px;
      cursor: pointer;
      transition: transform .1s, box-shadow .1s;
      box-shadow: 4px 4px 0 #a07800;
      letter-spacing: 2px;
      -webkit-tap-highlight-color: transparent;
      min-width: 160px;
    }

    .btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 #a07800
    }

    .btn:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 #a07800
    }

    .btn-outline {
      background: transparent;
      color: var(--accent);
      border: 2px solid var(--accent);
      box-shadow: 4px 4px 0 #a07800;
    }

    .btn-outline:hover {
      background: rgba(247, 201, 72, 0.1)
    }

    .btn-toggle {
      background: transparent;
      color: var(--accent3);
      border: 2px solid var(--accent3);
      box-shadow: 4px 4px 0 #006644;
      font-size: 0.5rem;
      padding: 10px 18px;
    }

    .btn-toggle:hover {
      background: rgba(107, 255, 184, 0.1)
    }

    .btn-toggle.off {
      color: #666;
      border-color: #444;
      box-shadow: 4px 4px 0 #222;
    }

    .btn-toggle.off:hover {
      background: rgba(100, 100, 100, 0.1)
    }

    #hud {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      padding: 8px 14px;
      font-size: 0.5rem;
      color: var(--accent);
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.6), transparent);
      pointer-events: none;
      z-index: 5;
    }

    #hud.hidden {
      display: none
    }

    #hud-lives {
      color: var(--accent2)
    }

    #hud-powerups {
      display: flex;
      gap: 6px
    }

    .powerup-icon {
      font-size: 0.55rem;
      opacity: .8;
      animation: pulse 1s infinite;
    }

    .powerup-icon.hidden {
      display: none
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: .6
      }

      50% {
        opacity: 1
      }
    }

    /* ── MOBILE CONTROLS ── */
    #mobile-controls {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 120px;
      pointer-events: none;
      z-index: 6;
      display: none;
      /* shown by JS on touch devices */
    }

    #btn-left,
    #btn-right,
    #btn-jump,
    #btn-dash {
      position: absolute;
      pointer-events: all;
      background: rgba(247, 201, 72, .15);
      border: 2px solid rgba(247, 201, 72, .4);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      color: rgba(247, 201, 72, .8);
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }

    #btn-left {
      bottom: 14px;
      left: 10px;
      width: 64px;
      height: 60px
    }

    #btn-right {
      bottom: 14px;
      left: 84px;
      width: 64px;
      height: 60px
    }

    #btn-jump {
      bottom: 14px;
      right: 10px;
      width: 80px;
      height: 60px
    }

    #btn-dash {
      bottom: 14px;
      right: 100px;
      width: 64px;
      height: 60px
    }

    /* CHARACTER SELECT */
    #char-screen .overlay-box {
      padding: 20px 28px;
      gap: 10px
    }

    #char-screen h2 {
      font-size: 0.9rem;
      color: var(--accent);
      letter-spacing: 2px
    }

    #char-grid {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .char-card {
      width: 110px;
      background: #0a0a1a;
      border: 2px solid #2a2a4a;
      padding: 10px 8px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      transition: border-color .15s, transform .1s;
    }

    .char-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px)
    }

    .char-card.selected {
      border-color: var(--accent);
      background: #1a1a2e;
      box-shadow: 0 0 12px rgba(247, 201, 72, 0.3);
    }

    .char-canvas {
      width: 64px;
      height: 80px;
      image-rendering: pixelated
    }

    .char-name {
      font-size: 0.3rem;
      color: var(--accent);
      text-align: center;
      letter-spacing: 1px;
      line-height: 1.4
    }

    .char-desc {
      font-size: 0.25rem;
      color: #8888aa;
      text-align: center;
      line-height: 1.5
    }

    .settings-group {
      display: flex;
      flex-direction: column;
      gap: 13px;
      margin: 10px 0
    }

    .settings-group label {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text);
      font-size: 0.5rem
    }

    .settings-group select {
      background: var(--box-bg);
      border: 2px solid var(--accent);
      color: var(--text);
      padding: 7px 10px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.4rem;
    }

    #hud-combo.hidden {
      display: none
    }

    /* Responsive scaling via transform */
    @media (max-width: 820px) {
      .game-title {
        font-size: 1.5rem
      }

      .overlay-box {
        padding: 16px 14px;
        gap: 10px
      }

      #hud {
        font-size: .4rem;
        padding: 6px 10px
      }

      .controls-info {
        display: none
      }

      .char-card {
        width: 88px
      }
    }

    @media (max-width: 480px) {
      .game-title {
        font-size: 1.1rem;
        letter-spacing: 2px
      }

      #btn-left {
        width: 54px;
        height: 50px;
        left: 8px;
        bottom: 10px
      }

      #btn-right {
        width: 54px;
        height: 50px;
        left: 70px;
        bottom: 10px
      }

      #btn-jump {
        width: 68px;
        height: 50px;
        right: 8px;
        bottom: 10px
      }

      #btn-dash {
        width: 54px;
        height: 50px;
        right: 84px;
        bottom: 10px
      }
    }
  </style>
</head>

<body>
  <div id="game-wrapper">
    <canvas id="gameCanvas"></canvas>

    <!-- START -->
    <div id="start-screen" class="overlay">
      <div class="overlay-box">
        <h1 class="game-title">SKY DASHER</h1>
        <p class="subtitle">Leap. Dodge. Survive.</p>
        <div class="controls-info">
          <div class="ctrl"><span class="key">← →</span> Move</div>
          <div class="ctrl"><span class="key">Space / ↑</span> Jump (x2)</div>
          <div class="ctrl"><span class="key">Shift</span> Dash</div>
          <div class="ctrl"><span class="key">Esc</span> Pause</div>
        </div>
        <button id="start-btn" class="btn">PLAY</button>
        <button id="settings-btn" class="btn btn-outline">SETTINGS</button>
      </div>
    </div>

    <!-- CHAR SELECT -->
    <div id="char-screen" class="overlay hidden">
      <div class="overlay-box">
        <h2>CHOOSE YOUR HERO</h2>
        <div id="char-grid">
          <div class="char-card selected" data-char="0">
            <canvas class="char-canvas" id="cc0" width="64" height="80"></canvas>
            <div class="char-name">DASH KID</div>
            <div class="char-desc">The classic runner</div>
          </div>
          <div class="char-card" data-char="1">
            <canvas class="char-canvas" id="cc1" width="64" height="80"></canvas>
            <div class="char-name">BLAZE</div>
            <div class="char-desc">Fiery adventurer</div>
          </div>
          <div class="char-card" data-char="2">
            <canvas class="char-canvas" id="cc2" width="64" height="80"></canvas>
            <div class="char-name">FROST</div>
            <div class="char-desc">Cool & collected</div>
          </div>
          <div class="char-card" data-char="3">
            <canvas class="char-canvas" id="cc3" width="64" height="80"></canvas>
            <div class="char-name">SHADOW</div>
            <div class="char-desc">Mysterious ninja</div>
          </div>
          <div class="char-card" data-char="4">
            <canvas class="char-canvas" id="cc4" width="64" height="80"></canvas>
            <div class="char-name">PIXEL</div>
            <div class="char-desc">Retro robot pal</div>
          </div>
        </div>
        <button id="char-confirm-btn" class="btn">CONFIRM</button>
        <button id="char-back-btn" class="btn btn-outline">BACK</button>
      </div>
    </div>

    <!-- SETTINGS -->
    <div id="settings-screen" class="overlay hidden">
      <div class="overlay-box">
        <h2 style="font-size:.8rem;color:var(--accent)">SETTINGS</h2>
        <div class="settings-group">
          <label><input type="checkbox" id="sound-enabled" checked> Sound Effects</label>
        </div>
        <div class="settings-group">
          <label>Difficulty:
            <select id="difficulty">
              <option value="easy">Easy</option>
              <option value="normal" selected>Normal</option>
              <option value="hard">Hard</option>
            </select>
          </label>
        </div>
        <button id="settings-back-btn" class="btn">BACK</button>
      </div>
    </div>

    <!-- PAUSE — added music toggle -->
    <div id="pause-screen" class="overlay hidden">
      <div class="overlay-box">
        <h2 style="font-size:.8rem;color:var(--accent)">PAUSED</h2>
        <button id="resume-btn" class="btn">RESUME</button>
        <button id="music-toggle-btn" class="btn btn-toggle">🎵 MUSIC: ON</button>
        <button id="restart-pause-btn" class="btn btn-outline">RESTART</button>
      </div>
    </div>

    <!-- GAME OVER -->
    <div id="gameover-screen" class="overlay hidden">
      <div class="overlay-box">
        <h2 class="gameover-title">GAME OVER</h2>
        <p id="final-score" class="final-score"></p>
        <p id="best-score-el" class="best-score"></p>
        <button id="restart-btn" class="btn">PLAY AGAIN</button>
      </div>
    </div>

    <!-- HUD -->
    <div id="hud" class="hidden">
      <div id="hud-score">⭐ <span id="score-display">0</span></div>
      <div id="hud-lives">❤️ <span id="lives-display">3</span></div>
      <div id="hud-level">LVL <span id="level-display">1</span></div>
      <div id="hud-combo" class="hidden">COMBO <span id="combo-display">0</span></div>
      <div id="hud-powerups">
        <div id="powerup-speed" class="powerup-icon hidden">⚡</div>
        <div id="powerup-jump" class="powerup-icon hidden">⬆️</div>
        <div id="powerup-shield" class="powerup-icon hidden">🛡️</div>
        <div id="powerup-magnet" class="powerup-icon hidden">🧲</div>
      </div>
    </div>

    <!-- MOBILE CONTROLS -->
    <div id="mobile-controls">
      <div id="btn-left">◀</div>
      <div id="btn-right">▶</div>
      <div id="btn-jump">▲ JUMP</div>
      <div id="btn-dash">⚡</div>
    </div>
  </div>

  <script>
    // ─── RESPONSIVE SCALING ───────────────────────────────────
    const GAME_W = 800, GAME_H = 480;
    const wrapper = document.getElementById('game-wrapper');

    function scaleGame() {
      const scaleX = window.innerWidth / GAME_W;
      const scaleY = window.innerHeight / GAME_H;
      const scale = Math.min(scaleX, scaleY, 1); // never upscale on desktop
      wrapper.style.transform = `scale(${scale})`;
      wrapper.style.transformOrigin = 'top left';
      wrapper.style.position = 'absolute';
      wrapper.style.top = `${(window.innerHeight - GAME_H * scale) / 2}px`;
      wrapper.style.left = `${(window.innerWidth - GAME_W * scale) / 2}px`;
    }
    scaleGame();
    window.addEventListener('resize', scaleGame);

    // ─── TOUCH DETECTION → show mobile controls ───────────────
    let isTouchDevice = false;
    window.addEventListener('touchstart', () => {
      if (!isTouchDevice) {
        isTouchDevice = true;
        document.getElementById('mobile-controls').style.display = 'block';
      }
    }, { once: true });

    // ─── BACKGROUND MUSIC (Web Audio synth) ──────────────────
    let musicEnabled = true;
    let musicAC = null, musicNodes = [];

    function startMusic() {
      if (!musicEnabled) return;
      stopMusic();
      try {
        musicAC = new (window.AudioContext || window.webkitAudioContext)();
        const master = musicAC.createGain();
        master.gain.value = 0.04;
        master.connect(musicAC.destination);

        // simple chiptune loop: schedule repeating notes
        const notes = [262, 330, 392, 523, 440, 392, 330, 262];
        const beatDur = 0.28;
        let time = musicAC.currentTime + 0.1;

        function scheduleChunk() {
          if (!musicAC) return;
          for (let i = 0; i < notes.length * 2; i++) {
            const freq = i < notes.length ? notes[i] : notes[i - notes.length] * 1.5;
            const osc = musicAC.createOscillator();
            const g = musicAC.createGain();
            osc.type = i < notes.length ? 'square' : 'triangle';
            osc.frequency.value = freq;
            osc.connect(g); g.connect(master);
            g.gain.setValueAtTime(0, time + i * beatDur);
            g.gain.linearRampToValueAtTime(1, time + i * beatDur + 0.02);
            g.gain.linearRampToValueAtTime(0, time + i * beatDur + beatDur * 0.8);
            osc.start(time + i * beatDur);
            osc.stop(time + i * beatDur + beatDur);
            musicNodes.push(osc);
          }
          time += notes.length * 2 * beatDur;
        }

        // Schedule ahead every 2s
        scheduleChunk();
        const interval = setInterval(() => {
          if (!musicAC || !musicEnabled) { clearInterval(interval); return; }
          scheduleChunk();
        }, 2000);
        musicNodes._interval = interval;
      } catch (e) { }
    }

    function stopMusic() {
      if (musicNodes._interval) clearInterval(musicNodes._interval);
      musicNodes.forEach(n => { try { n.stop(); } catch (e) { } });
      musicNodes = [];
      if (musicAC) { try { musicAC.close(); } catch (e) { } musicAC = null; }
    }

    function toggleMusic() {
      musicEnabled = !musicEnabled;
      const btn = document.getElementById('music-toggle-btn');
      if (musicEnabled) {
        btn.textContent = '🎵 MUSIC: ON';
        btn.classList.remove('off');
        startMusic();
      } else {
        btn.textContent = '🔇 MUSIC: OFF';
        btn.classList.add('off');
        stopMusic();
      }
      try { localStorage.setItem('skyDasherMusic', musicEnabled ? '1' : '0'); } catch (e) { }
    }

    // load music pref
    try { if (localStorage.getItem('skyDasherMusic') === '0') { musicEnabled = false; document.getElementById('music-toggle-btn').textContent = '🔇 MUSIC: OFF'; document.getElementById('music-toggle-btn').classList.add('off'); } } catch (e) { }

    document.getElementById('music-toggle-btn').onclick = toggleMusic;

    // ─── CHARACTERS ───────────────────────────────────────────
    const CHARACTERS = [
      { name: 'DASH KID', body: '#f7c948', bodyShade: '#e0a020', head: '#ffd700', eye: '#0a0a1a', pupil: '#f7c948', belt: '#ff6b6b', shoe: '#e0a020', hair: '#ff6b6b', hairStyle: 'spiky' },
      { name: 'BLAZE', body: '#ff6b6b', bodyShade: '#cc3333', head: '#ff9999', eye: '#330000', pupil: '#ff6b6b', belt: '#ffaa00', shoe: '#cc3333', hair: '#ffaa00', hairStyle: 'flame' },
      { name: 'FROST', body: '#6bccff', bodyShade: '#3399cc', head: '#99ddff', eye: '#003366', pupil: '#6bccff', belt: '#ffffff', shoe: '#3399cc', hair: '#ffffff', hairStyle: 'snow' },
      { name: 'SHADOW', body: '#4a4a6a', bodyShade: '#2a2a4a', head: '#6a6a9a', eye: '#ff0066', pupil: '#330033', belt: '#ff0066', shoe: '#2a2a4a', hair: '#2a2a4a', hairStyle: 'mask' },
      { name: 'PIXEL', body: '#6bffb8', bodyShade: '#339966', head: '#99ffcc', eye: '#003322', pupil: '#00ff88', belt: '#ff66ff', shoe: '#339966', hair: '#ff66ff', hairStyle: 'antenna' }
    ];
    let selectedChar = 0;

    function drawCharPreview(canvasEl, charIdx, frame = 0) {
      const c = CHARACTERS[charIdx];
      const ctx2 = canvasEl.getContext('2d');
      const W2 = 64, H2 = 80, cx = 32, cy = 75, pw = 26, ph = 32;
      ctx2.clearRect(0, 0, W2, H2);
      ctx2.fillStyle = 'rgba(0,0,0,0.2)';
      ctx2.beginPath(); ctx2.ellipse(cx, cy + 2, pw / 2 - 1, 4, 0, 0, Math.PI * 2); ctx2.fill();
      ctx2.fillStyle = c.body; ctx2.fillRect(cx - pw / 2, cy - ph, pw, ph * 0.68);
      ctx2.fillStyle = c.head; ctx2.fillRect(cx - pw / 2 + 1, cy - ph - 22, pw - 2, ph * 0.38 + 4);
      ctx2.fillStyle = c.hair;
      if (c.hairStyle === 'spiky') { ctx2.fillRect(cx - 10, cy - ph - 22, 6, 8); ctx2.fillRect(cx - 3, cy - ph - 26, 6, 12); ctx2.fillRect(cx + 4, cy - ph - 22, 6, 8); }
      else if (c.hairStyle === 'flame') { ctx2.fillRect(cx - 8, cy - ph - 24, 5, 10); ctx2.fillRect(cx - 2, cy - ph - 28, 6, 14); ctx2.fillRect(cx + 5, cy - ph - 23, 4, 9); ctx2.fillStyle = '#ff4400'; ctx2.fillRect(cx - 1, cy - ph - 24, 4, 6); }
      else if (c.hairStyle === 'snow') { ctx2.fillRect(cx - 10, cy - ph - 24, 22, 8); ctx2.fillRect(cx - 8, cy - ph - 26, 6, 4); ctx2.fillRect(cx + 4, cy - ph - 26, 6, 4); }
      else if (c.hairStyle === 'mask') { ctx2.fillStyle = '#2a2a4a'; ctx2.fillRect(cx - 13, cy - ph - 22, 26, 20); ctx2.fillStyle = '#ff0066'; ctx2.fillRect(cx - 4, cy - ph - 15, 8, 4); }
      else if (c.hairStyle === 'antenna') { ctx2.fillRect(cx - 1, cy - ph - 30, 4, 12); ctx2.fillRect(cx - 4, cy - ph - 32, 10, 5); ctx2.fillStyle = '#ffff00'; ctx2.beginPath(); ctx2.arc(cx + 1, cy - ph - 33, 4, 0, Math.PI * 2); ctx2.fill(); }
      ctx2.fillStyle = c.eye; ctx2.fillRect(cx + pw / 2 - 14, cy - ph + 2, 8, 8);
      ctx2.fillStyle = c.pupil; ctx2.fillRect(cx + pw / 2 - 12, cy - ph + 4, 3, 3);
      ctx2.fillStyle = c.belt; ctx2.fillRect(cx - pw / 2 + 2, cy - ph * 0.44, pw - 4, 5);
      const lo = frame % 2 === 0 ? 0 : 5;
      ctx2.fillStyle = c.bodyShade;
      ctx2.fillRect(cx - pw / 2 + 2, cy - ph * 0.3, 9, ph * 0.32 + lo);
      ctx2.fillRect(cx + pw / 2 - 11, cy - ph * 0.3, 9, ph * 0.32 + (5 - lo));
      ctx2.fillStyle = c.shoe;
      ctx2.fillRect(cx - pw / 2, cy + 1 + lo, 12, 5);
      ctx2.fillRect(cx + pw / 2 - 12, cy + 1 + (5 - lo), 12, 5);
    }

    window.addEventListener('DOMContentLoaded', () => { for (let i = 0; i < 5; i++) { const cc = document.getElementById('cc' + i); if (cc) drawCharPreview(cc, i, 0); } });
    let previewFrame = 0;

    function createPlayer() {

    function spawnEnemy(x, platY, platW, type = ENEMY_TYPES.GROUND) {
      const e = { x: x + Math.random() * (platW - 30), y: platY - 30, w: 28, h: 28, vx: (Math.random() < 0.5 ? 1 : -1) * (1 + Math.random()), onGround: true, frame: 0, frameTimer: 0, startX: x, endX: x + platW - 28, alive: true, type };

    function spawnCoin(x, y) { return { x, y, w: 16, h: 16, collected: false, bobTimer: Math.random() * Math.PI * 2 }; }
    function burst(x, y, count = 8, color = null) {

    function activatePowerup(type) {

      if (type === POWERUP_TYPES.SHIELD) { playerPowerups.shield = true; playerPowerups.shieldTimer = d; }

    }
    function loadSettings() {

    }
    function playSound(freq, dur, type = 'square') {
      if (!soundEnabled) return;
      try { const ac = new (window.AudioContext || window.webkitAudioContext)(); const osc = ac.createOscillator(); const g = ac.createGain(); osc.connect(g); g.connect(ac.destination); osc.frequency.setValueAtTime(freq, ac.currentTime); osc.type = type; g.gain.setValueAtTime(0.1, ac.currentTime); g.gain.exponentialRampToValueAtTime(0.01, ac.currentTime + dur); osc.start(ac.currentTime); osc.stop(ac.currentTime + dur); } catch (e) { }
    }

    function startGame() {

      startScreen.classList.add('hidden'); pauseScreen.classList.add('hidden');

    function updateHUD() {

    }
    function rectOverlap(a, b) { return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }

    function update() {
      frameCount++;
      scrollSpeed = 2.5 + Math.floor(score / 300) * 0.4;
      const newLevel = 1 + Math.floor(score / 500);
      if (newLevel !== level) { level = newLevel; updateTheme(); }
      cameraX += scrollSpeed;
      const pRect = { x: player.x, y: player.y, w: player.w, h: player.h };
      let onWall = false, wallDirection = 0;
      for (const plat of platforms) {
        if (!rectOverlap(pRect, plat)) continue;
        const ox = Math.min(pRect.x + pRect.w, plat.x + plat.w) - Math.max(pRect.x, plat.x);
        const oy = Math.min(pRect.y + pRect.h, plat.y + plat.h) - Math.max(pRect.y, plat.y);
        if (ox < oy && Math.abs(player.vx) > 0) { wallDirection = player.x < plat.x ? -1 : 1; onWall = true; break; }
      }
      const currentSpeed = playerPowerups.speedBoost ? PLAYER_SPEED * 1.8 : PLAYER_SPEED;
      if (keys.left) { player.vx = -currentSpeed; player.facing = -1; }
      else if (keys.right) { player.vx = currentSpeed; player.facing = 1; }
      else player.vx *= 0.8;
      const maxJumps = playerPowerups.extraJump ? 3 : 2;
      if (keys.jump && player.jumpsLeft > 0) {

        else { player.vy = JUMP_FORCE + (player.jumpsLeft === maxJumps ? 1.5 : 0); player.jumpsLeft--; playJumpSound(); burst(player.x + player.w / 2, player.y + player.h, 5, COLORS.platformTop); }

        keys.jump = false;
      }
      if (keys.dash && dashCooldown <= 0 && !isDashing) {
        isDashing = true; dashCooldown = 180; player.vx = player.facing * PLAYER_SPEED * 2.5;
        player.vy = Math.min(player.vy, -2); burst(player.x + player.w / 2, player.y + player.h / 2, 8, COLORS.star);
        invincible = true; invincibleTimer = 30;
      }
      if (isDashing && Math.abs(player.vx) < PLAYER_SPEED * 0.5) isDashing = false;
      if (dashCooldown > 0) dashCooldown--;
      player.scaleX += (1 - player.scaleX) * 0.15;
      player.scaleY += (1 - player.scaleY) * 0.15;
      if (Math.abs(player.scaleX - 1) < 0.002) player.scaleX = 1;
      if (Math.abs(player.scaleY - 1) < 0.002) player.scaleY = 1;
      player.vy += GRAVITY; player.x += player.vx; player.y += player.vy;
      if (player.x < cameraX + 40) { player.x = cameraX + 40; player.vx = 0; }
      if (player.x > cameraX + W * 0.65) { player.x = cameraX + W * 0.65; player.vx = 0; }
      player.onGround = false;
      for (const plat of platforms) {
        if (!rectOverlap({ x: player.x, y: player.y, w: player.w, h: player.h }, plat)) continue;
        const ox = Math.min(player.x + player.w, plat.x + plat.w) - Math.max(player.x, plat.x);
        const oy = Math.min(player.y + player.h, plat.y + plat.h) - Math.max(player.y, plat.y);
        if (oy < ox && player.vy >= 0) { player.y = plat.y - player.h; player.vy = 0; player.onGround = true; player.jumpsLeft = playerPowerups.extraJump ? 3 : 2; player.scaleX = 1.15; player.scaleY = 0.85; }
        else if (ox < oy && Math.abs(player.vx) > 0) { if (player.x < plat.x) player.x = plat.x - player.w; else player.x = plat.x + plat.w; player.vx = 0; player.jumpsLeft = Math.max(player.jumpsLeft, 1); }

        if (rectOverlap({ x: player.x, y: player.y, w: player.w, h: player.h }, { x: c.x, y: c.y + Math.sin(c.bobTimer) * 4, w: c.w, h: c.h })) { c.collected = true; score += 10; playCoinSound(); burst(c.x + c.w / 2, c.y + c.h / 2, 6, COLORS.coin); updateHUD(); }

      powerups.forEach(p => {
        if (p.collected) return; p.bobTimer += 0.05;

          else if (player.vy > 0 && player.y + player.h < e.y + e.h * 0.6) { e.alive = false; combo++; comboTimer = 180; score += 50 + combo * 10; burst(e.x + e.w / 2, e.y + e.h / 2, 10, COLORS.enemy); player.vy = JUMP_FORCE * 0.7; updateHUD(); }

      const farthest = platforms.reduce((m, p) => p.isGround ? m : Math.max(m, p.x + p.w), 0);
      if (farthest < cameraX + W + 300) {
        const gap = 140 + Math.random() * 140; const np = spawnPlatform(farthest + gap); platforms.push(np);
        if (Math.random() < 0.65) for (let c = 0; c < Math.floor(Math.random() * 4) + 1; c++)coins.push(spawnCoin(np.x + c * 22 + 8, np.y - 22));
        if (Math.random() < 0.3 + level * 0.05 && np.w > 80) enemies.push(spawnEnemy(np.x, np.y, np.w, Object.values(ENEMY_TYPES)[Math.floor(Math.random() * 3)]));

    }

    function die() {
      playDeathSound();

      lives--; updateHUD();
      if (lives <= 0) { gameOver(); return; }
      player.x = cameraX + 100; player.y = GROUND_Y - 50; player.vx = 0; player.vy = 0; player.jumpsLeft = 2;
      player.scaleX = 1; player.scaleY = 1;
      invincible = true; invincibleTimer = 120;
    }

    function drawPlayer() {
      const c = CHARACTERS[selectedChar];
      const px = player.x + player.w / 2;
      const py = player.y + player.h;
      const pw = player.w, ph = player.h;
      ctx.save();
      ctx.translate(px, py);
      ctx.scale(player.facing * player.scaleX, player.scaleY);
      if (invincible && Math.floor(invincibleTimer / 6) % 2 === 0) ctx.globalAlpha = 0.4;
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.beginPath(); ctx.ellipse(0, 4, pw / 2 - 2, 5, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = c.body; ctx.fillRect(-pw / 2, -ph, pw, ph * 0.68);
      ctx.fillStyle = c.head; ctx.fillRect(-pw / 2 + 1, -ph - 22, pw - 2, ph * 0.38 + 4);
      ctx.fillStyle = c.hair;
      if (c.hairStyle === 'spiky') { ctx.fillRect(-10, -ph - 22, 6, 8); ctx.fillRect(-3, -ph - 26, 6, 12); ctx.fillRect(4, -ph - 22, 6, 8); }
      else if (c.hairStyle === 'flame') { ctx.fillRect(-8, -ph - 24, 5, 10); ctx.fillRect(-2, -ph - 28, 6, 14); ctx.fillRect(5, -ph - 23, 4, 9); ctx.fillStyle = '#ff4400'; ctx.fillRect(-1, -ph - 24, 4, 6); }
      else if (c.hairStyle === 'snow') { ctx.fillRect(-10, -ph - 24, 22, 8); ctx.fillRect(-8, -ph - 26, 6, 4); ctx.fillRect(4, -ph - 26, 6, 4); }
      else if (c.hairStyle === 'mask') { ctx.fillStyle = '#2a2a4a'; ctx.fillRect(-13, -ph - 22, 26, 20); ctx.fillStyle = c.belt; ctx.fillRect(-4, -ph - 15, 8, 4); }
      else if (c.hairStyle === 'antenna') { ctx.fillRect(-1, -ph - 30, 4, 12); ctx.fillRect(-4, -ph - 32, 10, 5); ctx.fillStyle = '#ffff00'; ctx.beginPath(); ctx.arc(1, -ph - 33, 4, 0, Math.PI * 2); ctx.fill(); }
      ctx.fillStyle = c.eye; ctx.fillRect(pw / 2 - 14, -ph + 2, 8, 8);
      ctx.fillStyle = c.pupil; ctx.fillRect(pw / 2 - 12, -ph + 4, 3, 3);
      ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.fillRect(pw / 2 - 11, -ph + 3, 2, 2);
      const lo = player.onGround ? (player.frame % 2 === 0 ? 0 : 5) : 0;
      ctx.fillStyle = c.bodyShade;
      ctx.fillRect(-pw / 2 + 2, -ph * 0.3, 9, ph * 0.32 + lo);
      ctx.fillRect(pw / 2 - 11, -ph * 0.3, 9, ph * 0.32 + (5 - lo));
      ctx.fillStyle = c.belt; ctx.fillRect(-pw / 2 + 2, -ph * 0.44, pw - 4, 5);
      ctx.fillStyle = c.shoe;
      ctx.fillRect(-pw / 2 - 1, lo + 1, 13, 6);
      ctx.fillRect(pw / 2 - 12, (5 - lo) + 1, 13, 6);
      ctx.restore();
      if (playerPowerups.shield) {
        ctx.save(); ctx.translate(px, py); ctx.scale(player.facing * player.scaleX, player.scaleY);
        ctx.strokeStyle = COLORS.platformTop; ctx.lineWidth = 3;
        ctx.globalAlpha = 0.8 + 0.2 * Math.sin(frameCount * 0.1);
        ctx.beginPath(); ctx.ellipse(0, -ph / 2, pw / 2 + 6, ph / 2 + 6, 0, 0, Math.PI * 2); ctx.stroke();
        ctx.restore();
      }
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, COLORS.sky1); grad.addColorStop(1, COLORS.sky2);
      ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
      stars.forEach(s => {
        const alpha = 0.4 + 0.6 * Math.abs(Math.sin(s.twinkle));
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
      });
      clouds.forEach(c => { ctx.fillStyle = COLORS.cloud; ctx.beginPath(); ctx.ellipse(c.x + c.w / 2, c.y + c.h / 2, c.w / 2, c.h / 2, 0, 0, Math.PI * 2); ctx.fill(); });
      ctx.save(); ctx.translate(-cameraX, 0);
      const ground = platforms.find(p => p.isGround);
      if (ground) {
        ctx.fillStyle = COLORS.ground; ctx.fillRect(cameraX - 50, ground.y, W + 100, H - ground.y);
        ctx.fillStyle = COLORS.groundTop; ctx.fillRect(cameraX - 50, ground.y, W + 100, 4);
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        for (let bx = Math.floor(cameraX / 40) * 40; bx < cameraX + W; bx += 40)ctx.fillRect(bx, ground.y + 8, 2, 8);
      }
      platforms.filter(p => !p.isGround).forEach(p => {
        ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(p.x + 4, p.y + 8, p.w, p.h);
        ctx.fillStyle = COLORS.platform; ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = COLORS.platformTop; ctx.fillRect(p.x, p.y, p.w, 4);
      });
      coins.forEach(c => {
        if (c.collected) return;
        const cy2 = c.y + Math.sin(c.bobTimer) * 4;
        ctx.fillStyle = COLORS.coin; ctx.beginPath(); ctx.ellipse(c.x + c.w / 2, cy2 + c.h / 2, c.w / 2, c.h / 2, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.beginPath(); ctx.ellipse(c.x + c.w / 2 - 2, cy2 + c.h / 2 - 3, 3, 5, -0.4, 0, Math.PI * 2); ctx.fill();
      });
      powerups.forEach(p => {
        if (p.collected || isNaN(p.x) || isNaN(p.y)) return;
        const py2 = p.y + Math.sin(p.bobTimer) * 4;
        const colorMap = { speed: COLORS.accent3, jump: COLORS.accent, shield: COLORS.platformTop, magnet: COLORS.accent2 };
        const color = colorMap[p.type]; if (!color) return;
        try { ctx.fillStyle = color; ctx.fillRect(p.x, py2, p.w, p.h); ctx.fillStyle = '#ffffff'; ctx.font = '10px monospace'; const icons = { speed: '⚡', jump: '↑', shield: '◈', magnet: '⊕' }; ctx.fillText(icons[p.type] || '?', p.x + 1, py2 + 12); } catch (e) { }
      });
      enemies.forEach(e => {
        if (!e.alive || isNaN(e.x)) return;
        try {
          if (e.type === ENEMY_TYPES.GROUND) {
            const dir = e.vx > 0 ? 1 : -1;
            ctx.fillStyle = COLORS.enemy; ctx.fillRect(e.x, e.y, e.w, e.h);
            const eyeX = dir > 0 ? e.x + e.w - 10 : e.x + 4;
            ctx.fillStyle = '#0a0a1a'; ctx.fillRect(eyeX, e.y + 7, 6, 7);
            ctx.fillStyle = '#ff0000'; ctx.fillRect(eyeX + 1, e.y + 8, 2, 3);
            ctx.fillStyle = '#cc3333'; const lo = e.frame === 0 ? 0 : 4;
            ctx.fillRect(e.x + 4, e.y + e.h, 6, 4 + lo); ctx.fillRect(e.x + e.w - 10, e.y + e.h, 6, 4 + (4 - lo));
            ctx.fillStyle = '#ff9999'; ctx.fillRect(e.x + 4, e.y - 6, 4, 6); ctx.fillRect(e.x + e.w - 8, e.y - 6, 4, 6);
          } else if (e.type === ENEMY_TYPES.FLYING) {
            ctx.fillStyle = '#ff9999'; ctx.fillRect(e.x, e.y, e.w, e.h);
            ctx.fillStyle = '#0a0a1a'; ctx.fillRect(e.x + e.w - 8, e.y + 4, 4, 4);
            ctx.fillStyle = '#ffcccc'; ctx.fillRect(e.x - 2, e.y + 2, 4, e.h - 4); ctx.fillRect(e.x + e.w - 2, e.y + 2, 4, e.h - 4);
          } else if (e.type === ENEMY_TYPES.SPIKE) {
            ctx.fillStyle = '#666666'; ctx.fillRect(e.x, e.y, e.w, e.h);
            ctx.fillStyle = '#999999'; for (let i = 0; i < 3; i++)ctx.fillRect(e.x + 2 + i * 6, e.y + 2, 4, e.h - 4);
          }
        } catch (e2) { }
      });
      drawPlayer();
      particles.forEach(p => {
        if (isNaN(p.x) || isNaN(p.r)) return;
        try { ctx.save(); ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill(); ctx.restore(); } catch (e) { }
      });
      ctx.restore();
      const vig = ctx.createRadialGradient(W / 2, H / 2, H * 0.3, W / 2, H / 2, H * 0.9);
      vig.addColorStop(0, 'transparent'); vig.addColorStop(1, 'rgba(0,0,0,0.45)');
      ctx.fillStyle = vig; ctx.fillRect(0, 0, W, H);
    }

    function loop() { if (!gameRunning || gamePaused) return; update(); draw(); animFrame = requestAnimationFrame(loop); }
  </script>
</body>
